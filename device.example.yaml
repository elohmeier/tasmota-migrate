# Example ESPHome device config for a device migrated from Tasmota.
#
# After migration, the device has a stock ESPHome partition layout.
# No custom partition table is needed -- this is a completely standard config.
#
# Upload to the installer:
#   esphome upload device.yaml --device <device-ip>

esphome:
  name: my-device

esp32:
  board: esp32dev  # Change to match your device
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "My-Device-Fallback"

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

# Add your sensors, switches, lights, etc. below:
